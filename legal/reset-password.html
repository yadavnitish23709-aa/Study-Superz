<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset Password | Study Superz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>:root{--bg:#060612;--bg2:#0d0d20;--a:#7c3aed;--a2:#06b6d4;--t:#f1f5f9;--t2:#94a3b8;--b:rgba(255,255,255,.08);--g:rgba(255,255,255,.04);}*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}.card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--b);border-radius:24px;padding:40px;}.logo{text-align:center;margin-bottom:28px;font-size:2.5rem;}.lt{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.ls{color:var(--t2);font-size:13px;text-align:center;margin-bottom:28px;line-height:1.6;}.fg{margin-bottom:16px;}label{font-size:12px;font-weight:700;color:var(--t2);display:block;margin-bottom:6px;}input{width:100%;padding:13px 14px;border-radius:10px;background:var(--g);border:1px solid var(--b);color:var(--t);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:all .2s;}input:focus{border-color:rgba(124,58,237,.5);}.str{height:3px;border-radius:2px;background:rgba(255,255,255,.05);margin-top:6px;overflow:hidden;}.strf{height:100%;border-radius:2px;transition:all .3s;}.strl{font-size:11px;margin-top:4px;text-align:right;}.btn{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;font-weight:800;font-size:15px;border:none;cursor:pointer;margin-top:6px;transition:all .3s;}.btn:hover{opacity:.9;transform:translateY(-1px);}.msg{padding:11px;border-radius:9px;font-size:13px;text-align:center;margin-top:12px;display:none;}.msg.s{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.2);}.msg.e{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2);}.reqs{list-style:none;display:flex;flex-direction:column;gap:4px;margin-top:8px;}.req{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:6px;transition:color .3s;}.req.met{color:#10b981;}.req::before{content:'○';}.req.met::before{content:'✓';}</style>
</head><body>
<div class="card">
  <div class="logo">🔐</div>
  <div class="lt">Set New Password</div>
  <div class="ls">Choose a strong password for your Study Superz account.</div>
  <div class="fg"><label>New Password</label>
    <input type="password" id="np" placeholder="Min 8 characters" oninput="checkStr(this.value)" autocomplete="new-password"/>
    <div class="str"><div class="strf" id="sf"></div></div>
    <div class="strl" id="sl"></div>
    <ul class="reqs"><li class="req" id="r1">At least 8 characters</li><li class="req" id="r2">Contains a number</li><li class="req" id="r3">Contains uppercase letter</li><li class="req" id="r4">Contains special character</li></ul>
  </div>
  <div class="fg"><label>Confirm Password</label><input type="password" id="cp" placeholder="Repeat password" autocomplete="new-password"/></div>
  <button class="btn" onclick="resetPwd()">Set New Password 🔐</button>
  <div class="msg" id="msg"></div>
  <div style="text-align:center;margin-top:18px;"><a href="../index.html" style="font-size:13px;color:var(--t2);text-decoration:none;">← Back to Study Superz</a></div>
</div>
<script>
const{createClient}=supabase;
const SB=createClient('https://mlpsqojltzkrsykhcico.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1scHNxb2psdHprcnN5a2hjaWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzU5MTUsImV4cCI6MjA5NjMxMTkxNX0.w2Xfo_x7MpFhhIIzW2uh0o-XdZkZNIJvSEEWEzD7cJ0');
function checkStr(p){
  const r=[p.length>=8,/[0-9]/.test(p),/[A-Z]/.test(p),/[^A-Za-z0-9]/.test(p)];
  r.forEach((v,i)=>document.getElementById('r'+(i+1)).classList.toggle('met',v));
  const s=r.filter(Boolean).length;
  const sf=document.getElementById('sf');
  sf.style.width=['0%','25%','50%','75%','100%'][s];
  sf.style.background=['','#ef4444','#f59e0b','#84cc16','#10b981'][s];
  document.getElementById('sl').textContent=['','Weak','Fair','Good','Strong'][s];
  document.getElementById('sl').style.color=['','#ef4444','#f59e0b','#84cc16','#10b981'][s];
}
async function resetPwd(){
  const np=document.getElementById('np').value;
  const cp=document.getElementById('cp').value;
  const msg=document.getElementById('msg');
  msg.style.display='none';
  if(np.length<8){msg.style.display='block';msg.className='msg e';msg.textContent='Password must be at least 8 characters.';return;}
  if(np!==cp){msg.style.display='block';msg.className='msg e';msg.textContent='Passwords do not match.';return;}
  const btn=document.querySelector('.btn');btn.disabled=true;btn.textContent='Setting password...';
  const{error}=await SB.auth.updateUser({password:np});
  btn.disabled=false;btn.textContent='Set New Password 🔐';
  msg.style.display='block';
  if(error){msg.className='msg e';msg.textContent='❌ '+error.message;}
  else{msg.className='msg s';msg.textContent='✅ Password updated! Redirecting...';setTimeout(()=>window.location.href='../index.html',2000);}
}
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.ctrlKey&&['u','s','i','j'].includes(e.key))e.preventDefault();if(e.key==='F12')e.preventDefault();});
</script></body></html>
