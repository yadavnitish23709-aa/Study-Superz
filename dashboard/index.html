<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Dashboard | Study Superz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#060612;--bg2:#0d0d20;--a:#7c3aed;--a2:#06b6d4;--a3:#f59e0b;--a4:#10b981;--t:#f1f5f9;--t2:#94a3b8;--t3:#475569;--g:rgba(255,255,255,.04);--b:rgba(255,255,255,.08);}
*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;}
nav{position:sticky;top:0;z-index:100;padding:13px 22px;background:rgba(6,6,18,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;}
.bk{padding:7px 14px;border-radius:8px;background:var(--g);border:1px solid var(--b);color:var(--t2);font-size:13px;text-decoration:none;}
.nt{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;margin-right:auto;}
.main{max-width:1000px;margin:0 auto;padding:32px 20px;}
.profile-card{background:var(--g);border:1px solid var(--b);border-radius:20px;padding:28px;display:flex;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
.ava{width:70px;height:70px;border-radius:18px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.8rem;color:#fff;flex-shrink:0;}
.pname{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;}
.pemail{font-size:13px;color:var(--t3);margin-top:2px;}
.pclass{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:6px;background:rgba(6,182,212,.12);color:var(--a2);font-size:11px;font-weight:700;}
.editbtn{margin-left:auto;padding:9px 18px;border-radius:9px;background:var(--g);border:1px solid var(--b);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.sc{background:var(--g);border:1px solid var(--b);border-radius:14px;padding:18px;text-align:center;}
.sc-v{font-family:'Syne',sans-serif;font-weight:800;font-size:1.7rem;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sc-l{font-size:11px;color:var(--t3);margin-top:3px;}
.card{background:var(--g);border:1px solid var(--b);border-radius:16px;padding:22px;margin-bottom:18px;}
.card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:14px;}
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px;}
.fi{width:100%;padding:11px 13px;border-radius:10px;background:var(--bg2);border:1px solid var(--b);color:var(--t);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;}
.savebtn{padding:11px 22px;border-radius:10px;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;font-weight:700;font-size:13px;border:none;cursor:pointer;}
.lockwall{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9000;text-align:center;padding:20px;}
@media(max-width:600px){.stats{grid-template-columns:1fr 1fr;}.profile-card{flex-direction:column;text-align:center;}.editbtn{margin-left:0;}}
</style>
</head>
<body>

<div class="lockwall" id="lockwall">
  <div>
    <div style="font-size:3rem;margin-bottom:14px;">🔐</div>
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:8px;">Please Login</div>
    <div style="color:var(--t3);font-size:13px;margin-bottom:20px;">Sign in to view your personal dashboard.</div>
    <a href="../index.html" style="padding:11px 22px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;font-weight:700;font-size:13px;text-decoration:none;">Go to Home →</a>
  </div>
</div>

<div id="dash-content" style="display:none;">
<nav>
  <a href="../index.html" class="bk">← Back</a>
  <span class="nt">📊 My Dashboard</span>
</nav>
<div class="main">
  <div class="profile-card">
    <div class="ava" id="p-ava">?</div>
    <div>
      <div class="pname" id="p-name">—</div>
      <div class="pemail" id="p-email">—</div>
      <span class="pclass" id="p-class">—</span>
    </div>
    <button class="editbtn" onclick="document.getElementById('edit-card').scrollIntoView({behavior:'smooth'})">✏️ Edit Profile</button>
  </div>

  <div class="stats">
    <div class="sc"><div class="sc-v" id="s-xp">0</div><div class="sc-l">Total XP</div></div>
    <div class="sc"><div class="sc-v" id="s-lvl">1</div><div class="sc-l">Level</div></div>
    <div class="sc"><div class="sc-v" id="s-streak">0 🔥</div><div class="sc-l">Day Streak</div></div>
    <div class="sc"><div class="sc-v" id="s-joined">—</div><div class="sc-l">Member Since</div></div>
  </div>

  <div class="card" id="edit-card">
    <div class="card-title">✏️ Edit Your Details</div>
    <div class="fg"><label class="fl">Full Name</label><input class="fi" id="edit-name"/></div>
    <div class="fg"><label class="fl">Class</label>
      <select class="fi" id="edit-class">
        <option>Nursery</option><option>KG</option><option>Class 1</option><option>Class 2</option><option>Class 3</option>
        <option>Class 4</option><option>Class 5</option><option>Class 6</option><option>Class 7</option><option>Class 8</option>
        <option>Class 9</option><option>Class 10</option><option>Class 11</option><option>Class 12</option>
      </select>
    </div>
    <button class="savebtn" onclick="saveProfile()">💾 Save Changes</button>
    <div id="save-msg" style="margin-top:10px;font-size:12px;"></div>
  </div>

  <div class="card">
    <div class="card-title">🔒 Account Security</div>
    <button class="savebtn" style="background:var(--g);border:1px solid var(--b);color:var(--t2);" onclick="resetMyPassword()">🔑 Reset Password</button>
    <button class="savebtn" style="background:rgba(239,68,68,.12);color:#ef4444;margin-left:8px;" onclick="logoutUser()">🚪 Logout</button>
  </div>

  <div class="card">
    <div class="card-title">📚 Quick Links</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <a href="../tools/mock-test.html" style="padding:9px 16px;border-radius:9px;background:var(--bg2);border:1px solid var(--b);color:var(--t2);font-size:12px;text-decoration:none;">🎯 Mock Test</a>
      <a href="../notes/index.html" style="padding:9px 16px;border-radius:9px;background:var(--bg2);border:1px solid var(--b);color:var(--t2);font-size:12px;text-decoration:none;">📝 Notes</a>
      <a href="../tools/study-hub.html" style="padding:9px 16px;border-radius:9px;background:var(--bg2);border:1px solid var(--b);color:var(--t2);font-size:12px;text-decoration:none;">🎵 Study Hub</a>
      <a href="../exams/index.html" style="padding:9px 16px;border-radius:9px;background:var(--bg2);border:1px solid var(--b);color:var(--t2);font-size:12px;text-decoration:none;">🏆 Exams</a>
    </div>
  </div>
</div>
</div>

<script>
const{createClient}=supabase;
const SB=createClient('https://mlpsqojltzkrsykhcico.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1scHNxb2psdHprcnN5a2hjaWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzU5MTUsImV4cCI6MjA5NjMxMTkxNX0.w2Xfo_x7MpFhhIIzW2uh0o-XdZkZNIJvSEEWEzD7cJ0');
let me=null;

SB.auth.getSession().then(({data:{session}})=>{
  if(!session){document.getElementById('lockwall').style.display='flex';return;}
  loadProfile(session.user);
});

async function loadProfile(user){
  document.getElementById('lockwall').style.display='none';
  document.getElementById('dash-content').style.display='block';
  const{data:profile}=await SB.from('profiles').select('*').eq('id',user.id).single();
  me=profile||{};
  const name=me.full_name||user.email.split('@')[0];
  document.getElementById('p-ava').textContent=name[0].toUpperCase();
  document.getElementById('p-name').textContent=name;
  document.getElementById('p-email').textContent=user.email;
  document.getElementById('p-class').textContent=me.class||'Not set';
  document.getElementById('s-xp').textContent=(me.xp||0).toLocaleString();
  document.getElementById('s-lvl').textContent=me.level||1;
  document.getElementById('s-streak').textContent=(me.streak||0)+' 🔥';
  document.getElementById('s-joined').textContent=me.created_at?new Date(me.created_at).toLocaleDateString('en-IN',{month:'short',year:'numeric'}):'—';
  document.getElementById('edit-name').value=name;
  document.getElementById('edit-class').value=me.class||'Class 10';
}

async function saveProfile(){
  const{data:{session}}=await SB.auth.getSession();
  if(!session)return;
  const name=document.getElementById('edit-name').value.trim();
  const cls=document.getElementById('edit-class').value;
  const msg=document.getElementById('save-msg');
  const{error}=await SB.from('profiles').update({full_name:name,class:cls}).eq('id',session.user.id);
  if(error){msg.style.color='#ef4444';msg.textContent='❌ '+error.message;}
  else{msg.style.color='#10b981';msg.textContent='✅ Profile updated!';loadProfile(session.user);}
}

async function resetMyPassword(){
  const{data:{session}}=await SB.auth.getSession();
  if(!session)return;
  await SB.auth.resetPasswordForEmail(session.user.email,{redirectTo:window.location.origin+'/legal/reset-password.html'});
  alert('✅ Password reset link sent to your email!');
}

async function logoutUser(){await SB.auth.signOut();window.location.href='../index.html';}

document.addEventListener('contextmenu',e=>e.preventDefault());
</script>
</body>
</html>
